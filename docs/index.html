<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>RSS内容推荐</title>
  <meta name="description" content="公开版 RSS 内容推荐（增量更新）。每期包含标题、来源、链接、摘要与上榜理由。" />
  <meta name="robots" content="index,follow" />

  <link rel="canonical" href="https://zhhbinn.github.io/rss-pick/" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://zhhbinn.github.io/rss-pick/" />
  <meta property="og:title" content="RSS内容推荐" />
  <meta property="og:description" content="公开版 RSS 内容推荐（增量更新）。" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="RSS内容推荐" />
  <meta name="twitter:description" content="公开版 RSS 内容推荐（增量更新）。" />

  <link rel="alternate" type="application/rss+xml" title="RSS内容推荐" href="https://zhhbinn.github.io/rss-pick/rss.xml" />

  <script type="application/ld+json" id="ldjson">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "RSS内容推荐",
    "description": "公开版 RSS 内容推荐（增量更新）。"
  }
  </script>

  <style>
    :root{
      --bg:#f6f1e6;
      --paper:#fffdf8;
      --ink:#111;
      --muted:#555;
      --rule:#d8d2c6;
      --ok:#0b6b3a;
      --warn:#8a5a00;
      --bad:#9b1c1c;
      --serif: ui-serif, Georgia, "Times New Roman", Times, serif;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:var(--sans);
      color:var(--ink);
      background:radial-gradient(1200px 600px at 60% 0%, #fff 0%, var(--bg) 60%), linear-gradient(180deg, var(--bg), #f1ecdf);
    }
    a{color:inherit}

    .wrap{max-width:1320px;margin:0 auto;padding:16px 14px 44px}

    /* Main page block (no masthead/header area as requested) */
    main{
      background:var(--paper);
      border:1px solid var(--rule);
      border-radius:14px;
      padding:18px;
      box-shadow:0 10px 22px rgba(0,0,0,.04);
    }

    .topline{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      padding-bottom:12px;
      border-bottom:1px solid var(--rule);
      margin-bottom:14px;
    }

    .edition{
      font-family:var(--serif);
      font-size:26px;
      line-height:1.12;
      margin:0;
    }

    .meta{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .chip{
      font-size:12px;
      color:var(--muted);
      border:1px solid var(--rule);
      background:#fff;
      border-radius:999px;
      padding:6px 10px;
      white-space:nowrap;
    }

    .badge{
      font-family:var(--mono);
      font-size:12px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(0,0,0,.12);
      background:#fff;
    }
    .badge.ok{color:var(--ok);border-color:rgba(11,107,58,.35)}
    .badge.warn{color:var(--warn);border-color:rgba(138,90,0,.35)}
    .badge.bad{color:var(--bad);border-color:rgba(155,28,28,.35)}

    /* Newspaper columns */
    .columns{
      column-count: 3;
      column-gap: 30px;
      column-rule: 1px solid var(--rule);
    }
    @media (max-width: 1120px){
      .columns{column-count:2}
    }
    @media (max-width: 760px){
      .columns{column-count:1; column-rule:none}
      .wrap{padding:12px 10px 28px}
      main{border-radius:12px;padding:14px}
      .edition{font-size:22px}
    }

    .item{
      break-inside: avoid;
      padding:0 0 16px;
      margin:0 0 16px;
      border-bottom:1px solid var(--rule);
    }

    .title{
      margin:0;
      font-family:var(--serif);
      font-size:20px;
      line-height:1.35;
    }
    .title a{
      text-decoration:none;
      border-bottom:1px solid rgba(0,0,0,.18);
    }
    .title a:hover{border-bottom-color:rgba(0,0,0,.45)}

    .byline{margin-top:8px;font-size:13px;color:var(--muted)}
    .stamp{margin-top:6px;font-size:12px;color:var(--muted)}
    .summary{margin-top:10px;font-size:14px;line-height:1.72;color:var(--muted)}
    .reason{margin-top:10px;font-size:14px;line-height:1.74}

    footer{
      margin-top:16px;
      font-size:12px;
      color:var(--muted);
      border-top:1px solid var(--rule);
      padding-top:12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main>
      <div class="topline">
        <h1 class="edition" id="editionTitle">RSS内容推荐</h1>
        <div class="meta">
          <div class="chip" id="updated">更新时间：—</div>
          <div class="badge" id="status">—</div>
          <div class="chip" id="issue">issue：—</div>
        </div>
      </div>

      <section class="columns" id="items"></section>

      <footer>
        公开版：仅展示“内容推荐”（增量更新）。
      </footer>
    </main>
  </div>

  <script>
    function fmtTime(iso){
      if(!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleString('zh-CN', {hour12:false});
    }
    function badgeClass(status){
      if(status === 'ok') return 'ok';
      if(status === 'warn') return 'warn';
      return 'bad';
    }
    function statusLabel(status){
      if(status === 'ok') return 'OK';
      if(status === 'warn') return 'WARN';
      return 'FAIL';
    }
    function escapeHtml(s){
      return String(s).replace(/[&<>\"]/g, c=>({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'
      }[c]));
    }
    function escapeAttr(s){
      return String(s || '').replace(/[\s\"\'<>]/g, '');
    }

    async function main(){
      let data;
      try{
        const res = await fetch('./results.json', {cache:'no-store'});
        if(!res.ok) throw new Error('HTTP ' + res.status);
        data = await res.json();
      } catch(e){
        document.getElementById('items').innerHTML = '<div>无法加载 results.json。请检查 GitHub Pages（main /docs）是否开启。</div>';
        return;
      }

      const runs = (data.runs || [])
        .filter(r => r && r.check === 'freshrss-digest')
        .slice()
        .sort((a,b)=> (b.ts||'').localeCompare(a.ts||''));
      const latest = runs[0];

      const st = (latest?.status || data?.meta?.overall_status || 'ok');
      const sEl = document.getElementById('status');
      sEl.className = 'badge ' + badgeClass(st);
      sEl.textContent = statusLabel(st);

      const updatedAt = data?.meta?.updated_at || latest?.ts;
      document.getElementById('updated').textContent = '更新时间：' + fmtTime(updatedAt);
      document.getElementById('issue').textContent = 'issue：' + (latest?.ts ? latest.ts.slice(0,19) : '—');
      document.getElementById('editionTitle').textContent = latest?.edition?.title || 'RSS内容推荐';

      // JSON-LD update
      const ld = {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": (latest?.edition?.title || 'RSS内容推荐'),
        "description": data?.meta?.subtitle || "公开版 RSS 内容推荐（增量更新）。",
        "dateModified": updatedAt || undefined
      };
      try { document.getElementById('ldjson').textContent = JSON.stringify(ld, null, 2); } catch {}

      const itemsEl = document.getElementById('items');
      const items = latest?.edition?.items || [];
      itemsEl.innerHTML = items.map(it => {
        const rec = it.recommended_at || latest?.ts;
        return `\
        <article class=\"item\">\
          <h2 class=\"title\"><a href=\"${escapeAttr(it.link)}\" target=\"_blank\" rel=\"noreferrer\">${escapeHtml(it.title || '—')}</a></h2>\
          <div class=\"byline\">${escapeHtml(it.source || '—')}</div>\
          <div class=\"stamp\">推荐时间：${escapeHtml(fmtTime(rec))}</div>\
          ${it.summary ? `<div class=\"summary\">${escapeHtml(it.summary)}</div>` : ''}\
          ${it.reason ? `<div class=\"reason\"><b>上榜理由：</b>${escapeHtml(it.reason)}</div>` : ''}\
        </article>\
      `;
      }).join('');
    }

    main();
  </script>
</body>
</html>
